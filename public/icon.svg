    <ellipse cx="0" cy="0" rx="105" ry="55" fill="url(#corpo)"/>
    <ellipse cx="-30" cy="-8" rx="78" ry="38" fill="#3d2817" opacity="0.5"/>

    <circle cx="-72" cy="0" r="28" fill="#1a0e08"/>
