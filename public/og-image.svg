<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1f3a26"/>
      <stop offset="60%" stop-color="#0e1b14"/>
      <stop offset="100%" stop-color="#050807"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef9c3" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#92400e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="corpo" cx="40%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#7d5a2a"/>
      <stop offset="100%" stop-color="#2a1810"/>
    </radialGradient>
    <linearGradient id="asa" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#fde047" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg)"/>

  <g opacity="0.7">
    <circle cx="120" cy="180" r="5" fill="#fde047"/>
    <circle cx="1050" cy="140" r="4" fill="#fef3c7"/>
    <circle cx="1130" cy="320" r="5" fill="#fbbf24"/>
    <circle cx="70" cy="420" r="4" fill="#fde047"/>
    <circle cx="1100" cy="780" r="5" fill="#fef3c7"/>
    <circle cx="150" cy="900" r="4" fill="#fbbf24"/>
    <circle cx="1080" cy="1050" r="5" fill="#fde047"/>
    <circle cx="100" cy="1100" r="4" fill="#fef3c7"/>
    <circle cx="900" cy="1080" r="3" fill="#fbbf24"/>
    <circle cx="300" cy="100" r="3" fill="#fde047"/>
  </g>

  <text x="600" y="220" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="36" font-weight="600" fill="#fde047" letter-spacing="8">PUZZLE · LÓGICA · FLORESTA</text>

  <circle cx="600" cy="600" r="280" fill="url(#halo)" filter="url(#glow)" opacity="0.85"/>

  <g transform="translate(600 600)">
    <ellipse cx="-50" cy="-110" rx="140" ry="62" fill="url(#asa)" opacity="0.85" transform="rotate(-18)"/>
    <ellipse cx="-50" cy="110" rx="140" ry="62" fill="url(#asa)" opacity="0.85" transform="rotate(18)"/>
    <ellipse cx="0" cy="0" rx="180" ry="92" fill="url(#corpo)"/>
    <ellipse cx="-50" cy="-12" rx="130" ry="62" fill="#3d2817" opacity="0.5"/>
    <circle cx="-122" cy="0" r="46" fill="#1a0e08"/>
    <circle cx="-132" cy="-12" r="10" fill="#fef9c3"/>
    <path d="M-155 -16 Q-190 -60 -210 -100" stroke="#1a0e08" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M-155 16 Q-190 60 -210 100" stroke="#1a0e08" stroke-width="10" stroke-linecap="round" fill="none"/>
    <circle cx="-210" cy="-100" r="9" fill="#fbbf24"/>
    <circle cx="-210" cy="100" r="9" fill="#fbbf24"/>
    <circle cx="118" cy="0" r="64" fill="url(#halo)" filter="url(#glow)"/>
    <circle cx="118" cy="0" r="30" fill="#fef9c3"/>
    <circle cx="118" cy="0" r="13" fill="#fffbeb"/>
  </g>

  <g text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
    <text x="600" y="1000" font-size="140" font-weight="800" fill="url(#logo-grad)" letter-spacing="-3">Logic Bugs</text>
    <text x="600" y="1070" font-size="40" font-weight="500" fill="#e5e7eb">Pequenos engenheiros. <tspan font-weight="700" fill="#fde047">Grandes labirintos.</tspan></text>
    <text x="600" y="1140" font-size="28" font-weight="500" fill="#9ca3af" letter-spacing="4">pense antes de mover</text>
  </g>
</svg>
